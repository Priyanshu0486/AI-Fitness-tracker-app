services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fitness_tracker}
    ports:
      - "5433:5432"
    networks:
      - fitness-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    networks:
      - fitness-network
    volumes:
      - mongodb-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fitness-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fitness_tracker}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: priyanshu-fitness.duckdns.org
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "8181:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitness-network

  # Microservices
  config-server:
    build: ./config-server
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - fitness-network

  eureka:
    build: ./eureka
    container_name: eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - fitness-network


  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: gateway
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fitness-oauth2/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://priyanshu-fitness.duckdns.org/realms/fitness-oauth2
    depends_on:
      - config-server
      - eureka
    networks:
      - fitness-network

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: user-service
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fitness_tracker}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      - config-server
      - eureka
      - postgres
    networks:
      - fitness-network

  activity-service:
    build: ./activity-service
    container_name: activity-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: activity-service
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/activity_db?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - config-server
      - eureka
      - mongodb
      - rabbitmq
    networks:
      - fitness-network

  ai-service:
    build: ./ai-service
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: ai-service
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/ai_db?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=}
    depends_on:
      - config-server
      - eureka
      - mongodb
      - rabbitmq
    networks:
      - fitness-network

  # Frontend
  frontend:
    build: ./fitness-app-frontend
    container_name: fitness-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - fitness-network

  # Reverse Proxy (HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway
      - keycloak
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  caddy_data:
  caddy_config:
