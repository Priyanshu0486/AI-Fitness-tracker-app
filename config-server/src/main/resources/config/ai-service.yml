spring:
  data:
    mongodb:
      uri: mongodb://root:password@mongodb:27017/fitness-recommendations?authSource=admin
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
    port: 8083

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}
